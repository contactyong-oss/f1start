<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Reaction Game</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  cursor:pointer;
}

.game { width:90%; max-width:460px; text-align:center; }

.lights {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:12px;
  margin-bottom:30px;
}

.light {
  aspect-ratio:1;
  border-radius:50%;
  background:#250000;
}

.light.on {
  background:red;
  box-shadow:0 0 20px red;
}

.counter {
  font-size:48px;
  font-weight:900;
  margin-bottom:20px;
}

.button {
  padding:12px 20px;
  font-weight:700;
  border:none;
  border-radius:999px;
  margin:5px;
  cursor:pointer;
}

.hidden { display:none; }

.leaderboard {
  max-height:360px;
  overflow-y:auto;
}

.rank-row {
  display:grid;
  grid-template-columns:1fr auto auto;
  background:#1d1d1d;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="game">
  <div class="lights" id="lights"></div>

  <div class="counter" id="counter">0.0000</div>
  <div id="message">START를 누르세요</div>

  <button id="startBtn" class="button">START</button>
  <button id="viewLeaderboardBtn" class="button">리더보드</button>

  <div id="resultButtons" class="hidden">
    <button id="saveBtn" class="button">기록하기</button>
    <button id="retryBtn" class="button">다시하기</button>
  </div>

  <div id="nameInputBox" class="hidden">
    <input id="nameInput" placeholder="이름 입력"/>
    <button id="submitName" class="button">확인</button>
  </div>

  <div id="leaderboard" class="leaderboard hidden"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCu0m7d1aLoaDiZ8aupYgHUSxVzb8rsKRc",
  authDomain: "f1start-cc6eb.firebaseapp.com",
  projectId: "f1start-cc6eb",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lightsEl = document.getElementById("lights");
const counterEl = document.getElementById("counter");
const messageEl = document.getElementById("message");

const startBtn = document.getElementById("startBtn");
const viewLeaderboardBtn = document.getElementById("viewLeaderboardBtn");
const saveBtn = document.getElementById("saveBtn");
const retryBtn = document.getElementById("retryBtn");

const resultButtons = document.getElementById("resultButtons");
const nameInputBox = document.getElementById("nameInputBox");
const nameInput = document.getElementById("nameInput");
const submitName = document.getElementById("submitName");

const leaderboardEl = document.getElementById("leaderboard");

const lights = [];
let bottomLights;

let running=false;
let waiting=false;

let startTime=0;
let currentTime=0;

const KEY="fs_count";
const KEY_EXP="fs_expire";
const EXPIRE=30*60*1000;

let falseStartCount = loadFS();
let expireAt = Number(localStorage.getItem(KEY_EXP)||0);

let timeouts=[];

for(let i=0;i<10;i++){
  const el=document.createElement("div");
  el.className="light";
  lightsEl.appendChild(el);
  lights.push(el);
}

bottomLights = lights.slice(5,10);

function loadFS(){
  const exp=Number(localStorage.getItem(KEY_EXP));
  if(!exp || Date.now()>exp){
    localStorage.clear();
    return 0;
  }
  return Number(localStorage.getItem(KEY)||0);
}

function saveFS(){
  expireAt = Date.now()+EXPIRE;
  localStorage.setItem(KEY,falseStartCount);
  localStorage.setItem(KEY_EXP,expireAt);
}

function formatRemain(){
  let r = Math.max(0, expireAt-Date.now())/1000;
  const m = Math.floor(r/60);
  const s = (r%60).toFixed(3).padStart(6,"0");
  return `${String(m).padStart(2,"0")}:${s}`;
}

function clearTimers(){
  timeouts.forEach(t=>clearTimeout(t));
  timeouts=[];
}

function resetLights(){
  lights.forEach(l=>l.classList.remove("on"));
}

function updateCounter(){
  if(!running) return;
  const d=(performance.now()-startTime)/1000;
  currentTime=d;
  counterEl.textContent=d.toFixed(4);
  requestAnimationFrame(updateCounter);
}

function startGame(){
  clearTimers();
  resetLights();

  running=false;
  waiting=true;

  startBtn.style.display="none";
  viewLeaderboardBtn.style.display="none";

  let delay=0;

  bottomLights.forEach(l=>{
    timeouts.push(setTimeout(()=>l.classList.add("on"),delay));
    delay+=1000;
  });

  timeouts.push(setTimeout(()=>{
    bottomLights.forEach(l=>l.classList.remove("on"));
    startTime=performance.now();
    running=true;
    waiting=false;
    updateCounter();
  },delay+Math.random()*1000));
}

function falseStart(){
  falseStartCount++;
  saveFS();

  clearTimers();
  resetLights();

  running=false;
  waiting=false;

  counterEl.textContent="FALSE";

  // 🔥 여기만 표시
  function loop(){
    messageEl.textContent = 
      `False Start ${falseStartCount}회 / 초기화까지 ${formatRemain()}`;
    if(waiting || running) return;
    requestAnimationFrame(loop);
  }
  loop();

  startBtn.style.display="inline-block";
  viewLeaderboardBtn.style.display="inline-block";
}

function finishGame(){
  running=false;
  waiting=false;

  messageEl.textContent=`기록: ${currentTime.toFixed(4)}초`;
  resultButtons.classList.remove("hidden");
}

document.body.addEventListener("click",()=>{
  if(waiting){ falseStart(); return; }
  if(running){ finishGame(); }
});

startBtn.onclick=(e)=>{ e.stopPropagation(); startGame(); };

retryBtn.onclick=(e)=>{ e.stopPropagation(); startGame(); };

saveBtn.onclick=(e)=>{
  e.stopPropagation();
  nameInputBox.classList.remove("hidden");
};

submitName.onclick=async ()=>{
  const name=nameInput.value.trim();
  if(!name) return;

  const ref=doc(db,"leaderboard",name);
  const snap=await getDoc(ref);

  if(!snap.exists() || currentTime < snap.data().time){
    await setDoc(ref,{
      name,
      time:currentTime,
      falseStarts:falseStartCount
    });
  }

  showLeaderboard();
};

async function showLeaderboard(){
  leaderboardEl.classList.remove("hidden");

  const q=query(collection(db,"leaderboard"),orderBy("time"),limit(30));
  const snap=await getDocs(q);

  let html="<h3>TOP 30</h3>";

  let i=1;
  snap.forEach(d=>{
    const v=d.data();
    html+=`
    <div class="rank-row">
      <span>${i}. ${v.name}</span>
      <span>${v.time.toFixed(4)}</span>
      <span>${v.falseStarts||0}</span>
    </div>`;
    i++;
  });

  html+=`<button onclick="location.reload()">다시하기</button>`;
  leaderboardEl.innerHTML=html;
}

viewLeaderboardBtn.onclick=(e)=>{
  e.stopPropagation();
  showLeaderboard();
};

</script>

</body>
</html>
