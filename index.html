<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Reaction Game</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  user-select:none;
  cursor:pointer;
}

.game {
  width:90%;
  max-width:420px;
  text-align:center;
}

.lights {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:30px;
}

.light {
  aspect-ratio:1;
  border-radius:50%;
  background:#250000;
}

.light.on {
  background:red;
  box-shadow:0 0 20px red;
}

.counter {
  font-size:48px;
  font-weight:900;
  margin-bottom:20px;
}

.button {
  padding:12px 20px;
  font-size:16px;
  font-weight:700;
  border:none;
  border-radius:20px;
  cursor:pointer;
  margin:6px;
}

.hidden { display:none; }

input {
  padding:10px;
  font-size:16px;
  margin-top:10px;
  width:70%;
}

.leaderboard {
  margin-top:20px;
  text-align:left;
}
</style>
</head>

<body>

<div class="game">

  <div class="lights" id="lights"></div>

  <div class="counter" id="counter">0.0000</div>

  <button class="button" id="startBtn">START</button>

  <div id="resultButtons" class="hidden">
    <button class="button" id="saveBtn">기록하기</button>
    <button class="button" id="restartBtn">다시하기</button>
  </div>

  <div id="nameInputBox" class="hidden">
    <div>이름 입력</div>
    <input id="nameInput" placeholder="이름"/>
    <br/>
    <button class="button" id="submitName">확인</button>
  </div>

  <div id="leaderboard" class="leaderboard hidden"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCu0m7d1aLoaDiZ8aupYgHUSxVzb8rsKRc",
  authDomain: "f1start-cc6eb.firebaseapp.com",
  projectId: "f1start-cc6eb",
  storageBucket: "f1start-cc6eb.firebasestorage.app",
  messagingSenderId: "472809385228",
  appId: "1:472809385228:web:c537586b1ee4ab437e6d29",
  measurementId: "G-0XDT6010F4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lightsEl = document.getElementById("lights");
const counterEl = document.getElementById("counter");

const startBtn = document.getElementById("startBtn");
const saveBtn = document.getElementById("saveBtn");
const restartBtn = document.getElementById("restartBtn");

const resultButtons = document.getElementById("resultButtons");
const nameInputBox = document.getElementById("nameInputBox");
const nameInput = document.getElementById("nameInput");
const submitName = document.getElementById("submitName");

const leaderboardEl = document.getElementById("leaderboard");

const lights = [];
let bottomLights;

let running = false;
let waiting = false;
let startTime = 0;
let currentTime = 0;

let timeouts = [];

// 라이트 생성
for (let i = 0; i < 10; i++) {
  const el = document.createElement("div");
  el.className = "light";
  lightsEl.appendChild(el);
  lights.push(el);
}

bottomLights = lights.slice(5, 10);

function clearAllTimers() {
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
}

function resetLights() {
  lights.forEach(l => l.classList.remove("on"));
}

function updateCounter() {
  if (!running) return;

  const diff = (performance.now() - startTime) / 1000;
  currentTime = diff;

  counterEl.textContent = diff.toFixed(4);

  requestAnimationFrame(updateCounter);
}

function startGame() {
  clearAllTimers();
  resetLights();

  counterEl.textContent = "0.0000";

  running = false;
  waiting = true;

  startBtn.style.display = "none";
  resultButtons.classList.add("hidden");
  leaderboardEl.classList.add("hidden");

  let delay = 0;

  bottomLights.forEach(light => {
    const t = setTimeout(() => {
      light.classList.add("on");
    }, delay);

    timeouts.push(t);
    delay += 1000;
  });

  const randomDelay = Math.random() * 1000;

  const final = setTimeout(() => {
    bottomLights.forEach(l => l.classList.remove("on"));

    startTime = performance.now();
    running = true;
    waiting = false;

    updateCounter();
  }, delay + randomDelay);

  timeouts.push(final);
}

// 클릭
document.body.addEventListener("click", () => {

  if (waiting) {
    clearAllTimers();
    resetLights();

    counterEl.textContent = "FALSE START";

    running = false;
    waiting = false;

    startBtn.style.display = "block";
    startBtn.textContent = "RESTART";
    return;
  }

  if (running) {
    running = false;

    resultButtons.classList.remove("hidden");
  }
});

startBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  startGame();
});

restartBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  startGame();
});

saveBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  nameInputBox.classList.remove("hidden");
});

// 🔥 기록 저장 (핵심 로직)
submitName.addEventListener("click", async () => {

  const name = nameInput.value.trim();
  if (!name) return;

  const ref = doc(db, "leaderboard", name);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, { name, time: currentTime });
  } else {
    const prev = snap.data().time;

    if (currentTime < prev) {
      await setDoc(ref, { name, time: currentTime });
    }
  }

  showLeaderboard();
});

// 🔥 리더보드 TOP5
async function showLeaderboard() {

  nameInputBox.classList.add("hidden");
  leaderboardEl.classList.remove("hidden");

  const q = query(
    collection(db, "leaderboard"),
    orderBy("time"),
    limit(5)
  );

  const snap = await getDocs(q);

  let html = "<h3>🏆 TOP 5</h3>";

  let rank = 1;

  snap.forEach(doc => {
    const d = doc.data();
    html += `<div>${rank}. ${d.name} - ${d.time.toFixed(4)}초</div>`;
    rank++;
  });

  leaderboardEl.innerHTML = html;
}

</script>

</body>
</html>
