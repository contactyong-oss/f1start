<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F1 Reaction</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
  color:white;
  font-family:sans-serif;
  user-select:none;
  cursor:pointer;
}

.game {
  text-align:center;
  width:90%;
  max-width:420px;
}

.lights {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:30px;
}

.light {
  aspect-ratio:1;
  border-radius:50%;
  background:#250000;
}

.light.on {
  background:red;
  box-shadow:0 0 20px red;
}

.counter {
  font-size:48px;
  font-weight:900;
  margin-bottom:20px;
}

.button {
  padding:12px 20px;
  font-size:16px;
  font-weight:700;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="game">
  <div class="lights" id="lights"></div>
  <div class="counter" id="counter">0.0000</div>
  <button class="button" id="startBtn">START</button>
</div>

<script>
const lightsEl = document.getElementById("lights");
const counterEl = document.getElementById("counter");
const startBtn = document.getElementById("startBtn");

const lights = [];
let bottomLights;

let running = false;
let waiting = false;
let startTime = 0;

let timeouts = []; // 🔥 모든 타이머 저장

// 라이트 생성
for (let i = 0; i < 10; i++) {
  const el = document.createElement("div");
  el.className = "light";
  lightsEl.appendChild(el);
  lights.push(el);
}

bottomLights = lights.slice(5, 10);

// 타이머 전체 정리
function clearAllTimers() {
  timeouts.forEach(t => clearTimeout(t));
  timeouts = [];
}

// 라이트 초기화
function resetLights() {
  lights.forEach(l => l.classList.remove("on"));
}

// 카운터
function updateCounter() {
  if (!running) return;

  const diff = (performance.now() - startTime) / 1000;
  counterEl.textContent = diff.toFixed(4);

  requestAnimationFrame(updateCounter);
}

// 게임 시작
function startGame() {
  clearAllTimers();
  resetLights();

  counterEl.textContent = "0.0000";

  running = false;
  waiting = true;

  startBtn.style.display = "none";

  let delay = 0;

  bottomLights.forEach(light => {
    const t = setTimeout(() => {
      light.classList.add("on");
    }, delay);

    timeouts.push(t);
    delay += 1000; // 🔥 간격 (여기 수정 가능)
  });

  const randomDelay = Math.random() * 1000;

  const final = setTimeout(() => {
    bottomLights.forEach(l => l.classList.remove("on"));

    startTime = performance.now();
    running = true;
    waiting = false;

    updateCounter();
  }, delay + randomDelay);

  timeouts.push(final);
}

// 클릭 처리
document.body.addEventListener("click", () => {

  // false start
  if (waiting) {
    clearAllTimers();     // 🔥 핵심
    resetLights();

    running = false;
    waiting = false;

    counterEl.textContent = "FALSE START";

    startBtn.style.display = "inline-block";
    startBtn.textContent = "RESTART";
    return;
  }

  // 정상 클릭
  if (running) {
    running = false;

    startBtn.style.display = "inline-block";
    startBtn.textContent = "RESTART";
  }
});

startBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  startGame();
});
</script>

</body>
</html>
