<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Reaction Time</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      user-select: none;
      cursor: pointer;
    }

    .game {
      width: 100%;
      max-width: 480px;
      padding: 24px;
      text-align: center;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 28px;
    }

    .lights {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 14px;

      width: 100%;
      margin-bottom: 36px;
    }

    .light {
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: #260000;
      box-shadow:
        inset 0 0 12px rgba(0, 0, 0, 0.9),
        0 0 4px rgba(0, 0, 0, 0.8);
    }

    .light.on {
      background: #ff1111;
      box-shadow:
        0 0 18px #ff1111,
        0 0 35px rgba(255, 0, 0, 0.8),
        inset 0 0 8px rgba(255, 255, 255, 0.4);
    }

    .counter {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .message {
      font-size: 18px;
      color: #ccc;
      min-height: 28px;
      margin-bottom: 20px;
    }

    .button {
      border: none;
      background: white;
      color: #111;
      font-size: 18px;
      font-weight: 800;
      padding: 14px 24px;
      border-radius: 999px;
      cursor: pointer;
    }

    .button:active {
      transform: scale(0.96);
    }

    @media (max-width: 480px) {
      .game {
        max-width: 360px;
      }

      .counter {
        font-size: 42px;
      }

      .title {
        font-size: 21px;
      }

      .message {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="game">
    <div class="title">F1 반응속도 테스트</div>

    <div class="lights" id="lights"></div>

    <div class="counter" id="counter">0.0000</div>

    <div class="message" id="message">
      시작 버튼을 누르세요
    </div>

    <button class="button" id="startButton">
      START
    </button>
  </div>

  <script>
    const lightsContainer = document.getElementById("lights");
    const counter = document.getElementById("counter");
    const message = document.getElementById("message");
    const startButton = document.getElementById("startButton");

    const lights = [];

    let startTime = null;
    let running = false;
    let waitingForLightsOut = false;
    let gameStarted = false;

    for (let i = 0; i < 10; i++) {
      const light = document.createElement("div");
      light.className = "light";
      lightsContainer.appendChild(light);
      lights.push(light);
    }

    const bottomLights = lights.slice(5, 10);

    function resetLights() {
      lights.forEach(light => {
        light.classList.remove("on");
      });
    }

    function updateCounter() {
      if (!running) return;

      const now = performance.now();
      const elapsed = (now - startTime) / 1000;

      counter.textContent = elapsed.toFixed(4);

      requestAnimationFrame(updateCounter);
    }

    function startGame() {
      resetLights();

      counter.textContent = "0.0000";
      message.textContent = "불이 꺼지면 클릭하세요";

      running = false;
      waitingForLightsOut = true;
      gameStarted = true;

      startButton.style.display = "none";

      let delay = 0;

      bottomLights.forEach((light) => {
        setTimeout(() => {
          light.classList.add("on");
        }, delay);

        delay += 700;
      });

      const randomDelay = Math.random() * 1000;

      setTimeout(() => {
        bottomLights.forEach(light => {
          light.classList.remove("on");
        });

        startTime = performance.now();
        running = true;
        waitingForLightsOut = false;

        updateCounter();
      }, delay + randomDelay);
    }

    function handleClick() {
      if (!gameStarted) return;

      if (waitingForLightsOut) {
        resetLights();

        running = false;
        waitingForLightsOut = false;
        gameStarted = false;

        counter.textContent = "0.0000";
        message.textContent = "너무 빨랐습니다! False Start";

        startButton.textContent = "RESTART";
        startButton.style.display = "inline-block";

        return;
      }

      if (running) {
        running = false;
        gameStarted = false;

        message.textContent = "반응속도: " + counter.textContent + "초";

        startButton.textContent = "RESTART";
        startButton.style.display = "inline-block";
      }
    }

    startButton.addEventListener("click", function(event) {
      event.stopPropagation();
      startGame();
    });

    document.body.addEventListener("click", handleClick);
  </script>
</body>
</html>
